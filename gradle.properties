# Gradle optimization for limited memory environments (Render)
org.gradle.jvmargs=-Xmx512m -XX:+UseG1GC -XX:MaxGCPauseMillis=200 -XX:+ParallelRefProcEnabled -XX:+UnlockDiagnosticVMOptions -XX:G1NewCollectionHeuristicsWeight=20 -XX:+DisableExplicitGC -XX:-ResizePLab
org.gradle.parallel=false
org.gradle.workers.max=2
org.gradle.daemon=false
org.gradle.vfs.watch=false
org.gradle.caching=true
kotlin.incremental=true
kotlin.incremental.multiplatform=true

