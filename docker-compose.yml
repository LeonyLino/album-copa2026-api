version: '3.8'

services:
  app:
    build: .
    container_name: album-copa-app
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/album_copa
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME:-album_user}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-album_password}
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      SPRING_JPA_SHOW_SQL: "false"
      SPRING_PROFILES_ACTIVE: prod
      # Cloudinary
      CLOUDINARY_URL: ${CLOUDINARY_URL}
      # JWT
      JWT_SECRET: ${JWT_SECRET}
    networks:
      - album-network
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/actuator/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  db:
    image: postgres:16-alpine
    container_name: album-copa-db
    environment:
      POSTGRES_DB: album_copa
      POSTGRES_USER: ${DB_USERNAME:-album_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-album_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - album-network
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USERNAME:-album_user} -d album_copa" ]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  album-network:
    driver: bridge

volumes:
  postgres_data:

